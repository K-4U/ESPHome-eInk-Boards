sensor:
  # Create sensors for monitoring the board remotely.
  - platform: template
    name: "${friendly_name} Display Last Update"
    id: display_last_update
    update_interval: never
    device_class: timestamp
    entity_category: "diagnostic"
  - platform: template
    name: "${friendly_name} Recorded Display Refresh"
    id: recorded_display_refreshes
    update_interval: never
    accuracy_decimals: 0
    unit_of_measurement: "Refreshes"
    state_class: "total_increasing"
    entity_category: "diagnostic"
    lambda: 'return id(recorded_display_refresh);'
  - platform: wifi_signal
    # actually called from a script
    name: "${friendly_name} WiFi Signal Strength"
    id: wifisignal
    update_interval: never
    unit_of_measurement: "dBm"
    entity_category: "diagnostic"
    filters:
      #use moving median to smooth spikes
      - median:
          window_size: 5
          send_every: 5
          send_first_at: 5
  - platform: adc
    # get an unfiltered reading from the ADC pin
    name: "${friendly_name} Battery Unfiltered"
    id: battery_adc_raw
    update_interval: never
    pin: ${adc_pin}
    attenuation: 12db
    entity_category: "diagnostic"
    accuracy_decimals: 2
    device_class: battery
    unit_of_measurement: "V"
    internal: true
    filters:
      # this multiply number may need to be manually adjusted
      # I used a 3.7V LiPo battery: 5V -> 100K resistor -> ADC -> 100K resistor -> GND
      #                                                    ADC -> 100nF capacitor -> GND
      - multiply: 2
  - platform: template
    # This gets 5 readings (quickly) and calculates a median
    name: "${friendly_name} Battery"
    id: battery_adc
    update_interval: never
    entity_category: "diagnostic"
    accuracy_decimals: 2
    device_class: battery
    unit_of_measurement: "V"
    lambda: |-
      float readings[5];
      for (int i = 0; i < 5; i++) {
        id(battery_adc_raw).update();
        delay(50);  // wait for stable reading
        readings[i] = id(battery_adc_raw).state;
      }
      std::sort(readings, readings + 5);
      return readings[2];  // median value

  # Call numeric sensors from Home Assistant
  - platform: homeassistant
    name: "${friendly_name} Wake Time Helper"
    id: wake_time_helper
    entity_id: '${ha_wake_times}'
    attribute: wake_time_helper
    unit_of_measurement: seconds
    on_value:
      then:
         - lambda: 'id(wake_time_helper_updated) = true;'
  # Weather sensor
  - platform: homeassistant
    entity_id: '${ha_weather_entity}'
    attribute: temperature
    id: weather_now_temperature
    device_class: "temperature"
    on_value:
      then:
         - lambda: 'id(data_updated) = true;'
  - platform: template
    id: weather_now_max_temperature
    device_class: "temperature"
    update_interval: never
    on_value:
      then:
         - lambda: 'id(data_updated) = true;'
  - platform: template
    id: weather_now_min_temperature
    device_class: "temperature"
    update_interval: never
    on_value:
      then:
        - lambda: 'id(data_updated) = true;'

text_sensor:
  - platform: version
    name: "${friendly_name} ESPHome Version"
    hide_timestamp: True
    entity_category: diagnostic
  - platform: wifi_info
    ip_address:
      id: wifi_ip
      name: "${friendly_name} IP Address"
      entity_category: diagnostic
    ssid:
      id: wifi_ssid
      name: "${friendly_name} SSID"
      entity_category: diagnostic
  - platform: template
    name: "${friendly_name} ${project_name} Version"
    lambda: |-
      return {"${project_version}"};
    entity_category: diagnostic

  # Call text sensors from Home Assistant
  - platform: homeassistant
    entity_id: '${ha_tasks_data}'
    attribute: today
    id: temp_today
    on_value:
      then:
         - lambda: 'id(data_updated) = true;'
         - lambda: |-
            id(today).clear();
            id(today_times).clear();
            std::string body = id(temp_today).state;

            DynamicJsonDocument doc(2048);
            deserializeJson(doc, body);
            for(JsonVariant elem : doc.as<JsonArray>()){
              id(today).push_back(String(elem["event"].as<String>().c_str()));
              id(today_times).push_back(String(elem["start_time"].as<String>().c_str()));
            }

  - platform: homeassistant
    entity_id: '${ha_tasks_data}'
    attribute: upcoming
    id: temp_upcoming
    on_value:
      then:
        - lambda: 'id(data_updated) = true;'
        - lambda: |-
            id(upcoming).clear();
            id(upcoming_dates).clear();
            id(upcoming_times).clear();
            std::string body = id(temp_upcoming).state;

            DynamicJsonDocument doc(2048);
            deserializeJson(doc, body);
            for(JsonObject elem : doc.as<JsonArray>()){
              id(upcoming).push_back(String(elem["event"].as<String>().c_str()));
              id(upcoming_dates).push_back(String(elem["date"].as<String>().c_str()));
              id(upcoming_times).push_back(String(elem["start_time"].as<String>().c_str()));
            }
  
  # Weather sensors
  - platform: homeassistant
    entity_id: '${ha_weather_entity}'
    id: weather_now_condition
    on_value:
      then:
         - lambda: 'id(data_updated) = true;'

# Now render everything on the ePaper screen.
display:
  - platform: waveshare_epaper
    id: eink_display
    cs_pin:
      number: ${cs_pin}
    dc_pin: ${dc_pin}
    busy_pin:
      number: ${busy_pin}
      inverted: ${busy_inverted}
    reset_pin: ${reset_pin}
    model: ${model}
    update_interval: never
    setup_priority: 1000
    #rotation: 90°
    lambda: |-
      // Left from Madelena's code... perhaps if you want a black or colored background first (useful for fast-refresh screens?) to fill the background.
      // it.fill(color_bg);

      // Alignment rectangles! (uncomment to use - useful when first mounting the eInk screen)
      // it.rectangle(0, 0, 480, 800);
      // it.rectangle(10, 10, 460, 780);
      // it.rectangle(20, 20, 440, 760);
      // it.rectangle(30, 30, 420, 740);
      // it.rectangle(40, 40, 400, 720);
      // it.rectangle(50, 50, 380, 700);
      // it.rectangle(60, 60, 360, 680);
      // it.rectangle(70, 70, 340, 660);
      // it.rectangle(80, 80, 320, 640);
      
      int padding = 10;
      
      int col = padding;
      int row = 0;
      int spacing_title = get_text_dimension(&it, id(font_title), "%s", "TODAY", false);
      int spacing_today = get_text_dimension(&it, id(font_roboto_700_24), "%s", "Sample Task Text", false) + 2;
      int spacing_upcoming_date = get_text_dimension(&it, id(font_roboto_500_20), "%s", "Sunday August 25:", false) + 2;
      int spacing_upcoming_item = get_text_dimension(&it, id(font_roboto_700_20), "%s", "Sample Upcoming Task", false) + 2;
      int lastrow = it.get_height() - spacing_upcoming_item - spacing_upcoming_date;
      int header_height = 28;
      
      int width = it.get_width();
      int center = it.get_width() / 2;
      auto time = id(homeassistant_time).now();

      //Header
      it.filled_rectangle(0, 0, width, header_height, color_blk);

      // Refresh Timestamp with time and day
      // from https://community.home-assistant.io/t/esphome-show-time/348903
      it.printf(10, 2, id(font_mdi_22), COLOR_OFF, TextAlign::TOP_LEFT, "%s", "\U0000e5d5");
      it.strftime(35, 4, id(font_roboto_400_20), COLOR_OFF, TextAlign::TOP_LEFT, "%H:%M %a", time);

      //But also the current date.
      int current_date_width = get_text_dimension(&it, id(font_roboto_400_20), "%b %d %Y", time, true);
      it.printf(center - (current_date_width / 2), 2, id(font_mdi_22), COLOR_OFF, TextAlign::TOP_RIGHT, "%s", "\U0000ebcc");
      it.strftime(center, 4, id(font_roboto_400_20), COLOR_OFF, TextAlign::TOP_CENTER, "%b %d %Y", time);

      //Battery icon
      std::map<std::string, std::string> battery_icon_map
      {
        {"batteryhigh", "\U0000E1A4"},
        {"batterymed", "\U0000EBDD"},
        {"batterylow", "\U0000F155"},
        {"batterywarn", "\U0000E19C"}
      };
      int batt_x = width - padding; 
      int batt_y = 2;
      float batt_v = float(id(battery_adc).state);
      if (0 <= batt_v && batt_v < 3.4) { it.printf(batt_x, batt_y, id(font_mdi_22), color_red, TextAlign::TOP_RIGHT, "%s", battery_icon_map["batterywarn"].c_str()); }
      if (3.4 <= batt_v && batt_v < 3.6) { it.printf(batt_x, batt_y, id(font_mdi_22), color_red, TextAlign::TOP_RIGHT, "%s", battery_icon_map["batterylow"].c_str()); }
      if (3.6 <= batt_v && batt_v < 3.8) { it.printf(batt_x, batt_y, id(font_mdi_22), COLOR_OFF, TextAlign::TOP_RIGHT, "%s", battery_icon_map["batterymed"].c_str()); }
      if (3.8 <= batt_v && batt_v < 4.3) { it.printf(batt_x, batt_y, id(font_mdi_22), COLOR_OFF, TextAlign::TOP_RIGHT, "%s", battery_icon_map["batteryhigh"].c_str()); }
      // battery icon not displayed if voltage is above 4.3V (but ADC must still be connected to 5V pin)

      //HEADER DONE
      
      //TITLES:
      it.printf(center/2, header_height, id(font_title), color_red, TextAlign::TOP_CENTER, "TODAY");
      
      // TODAY'S TASKS
      row = header_height + spacing_title + 3; // to account for the horizontal line

      std::map<std::string, std::string> category_map
        {
          {"F:", "\U0000E87D"},
          {"W:", "\U0000E8F9"},
          {"P:", "\U0000E7FD"},
          {"J:", "\U0000E531"},
          {"M:", "\U0000f036"},
          {"B:", "\U0000e7e9"}
        };
      if(id(today).size() > 0){
        for(size_t i = 0; i < id(today).size();i++){
          std::string full_text = std::string(id(today)[i].c_str()); // Get the full string
          std::string category = full_text.substr(0, 2); // Extract the first two characters
          std::string event = full_text.substr(3); // Get the rest of the string
      
          it.printf(col, row+2, id(font_mdi_22), color_blk, TextAlign::TOP_LEFT, "%s", category_map[category].c_str());
          it.printf(col+25, row, id(font_roboto_700_24), color_blk, TextAlign::TOP_LEFT, "%s", event.c_str());
      
          it.printf(center-10, row+4, id(font_roboto_500_18_numeric), color_red, TextAlign::TOP_RIGHT, "%s", id(today_times)[i].c_str()); 
          row = row + spacing_today;
        }
      } else {
        it.printf(col, row, id(font_roboto_700_24), color_blk, TextAlign::TOP_LEFT, "%s", "Nothing today!");
        row = row + spacing_today;
      }

      
      // UPCOMING TASKS
      col = center + padding;

      it.printf(center + (center/2), header_height, id(font_title), color_red, TextAlign::TOP_CENTER, "UPCOMING");
      row = header_height + spacing_title;

      it.vertical_line(center, header_height+spacing_title, it.get_height(), color_red);
      it.horizontal_line(0, row, width, color_red);
      it.horizontal_line(0, row+1, width, color_red);
      it.horizontal_line(0, row+2, width, color_red);
      
      row = row + 3; // to account for the horizontal lines

      for(size_t i = 0; i< id(upcoming).size();i++){
        if ((row <= lastrow) && (! (id(upcoming)[i].isEmpty()))) {
          if (i == 0 || id(upcoming_dates)[i].compareTo(id(upcoming_dates)[i-1]) != 0) {
            it.printf(col, row, id(font_roboto_500_20), color_red, TextAlign::TOP_LEFT, "%s", (id(upcoming_dates)[i] + ":").c_str());
            row = row + spacing_upcoming_date;
          }
          std::string full_text = std::string(id(upcoming)[i].c_str()); // Get the full string
          std::string category = full_text.substr(0, 2); // Extract the first two characters
          std::string event = full_text.substr(3); // Get the rest of the string
          
          it.printf(col+5, row-1, id(font_mdi_22), color_blk, TextAlign::TOP_LEFT, "%s", category_map[category].c_str());
          it.printf(col+30, row, id(font_roboto_700_20), color_blk, TextAlign::TOP_LEFT, "%s", event.c_str());
          it.printf(width-10, row, id(font_roboto_500_18_numeric), color_red, TextAlign::TOP_RIGHT, "%s", id(upcoming_times)[i].c_str());
          row = row + spacing_upcoming_item;
        }
      }

      // Draw Calendar
      int days_padding_bottom = 10;
  
      int circle_size = 17;
  
      int cell_size_width = 30;
      int cell_size_height = 30;

      int calendar_height = (6 * cell_size_height) + days_padding_bottom;
      int calendar_width = 7 * cell_size_width + 10;
      int calendar_x_pos = 15;
      int calendar_y_pos = it.get_height() - calendar_height;

      it.horizontal_line(0, calendar_y_pos - 10, center, color_red); // line above calendar

      char cal[7][7][3]; // Calendar matrix including weekdays
      int days_line_left_position = 0;
      int days_line_right_position = 0;
  
      get_calendar_matrix(time.year, time.month, cal);
  
      for (int i = 0; i < 7; i++) {
        for (int j = 0; j < 7; j++) {
          int x_pos = calendar_x_pos + cell_size_width * j;
          int y_pos = calendar_y_pos + cell_size_height * i;
  
          if (i == 0) {
            // Header (day names)
            it.printf(x_pos, y_pos, id(font_roboto_500_20), color_red, TextAlign::CENTER, "%s", cal[i][j]);
            if (j == 0) {
              days_line_left_position = x_pos - (get_text_width( & it, id(font_roboto_700_20), "%s", cal[i][j]) / 2);
            } else if (j == 6) {
              days_line_right_position = x_pos + (get_text_width( & it, id(font_roboto_700_20), "%s", cal[i][j]) / 2);
            }
          } else {
            // Day numbers
            y_pos += days_padding_bottom;
            if (atoi(cal[i][j]) == time.day_of_month) {
              // Highlight current day
              it.filled_circle(x_pos, y_pos - 1, circle_size, color_blk);
              it.printf(x_pos, y_pos, id(font_roboto_700_20), COLOR_OFF, TextAlign::CENTER, "%s", cal[i][j]);
            } else {
              if(j > 4){ // Weekend
                it.printf(x_pos, y_pos, id(font_roboto_700_20), color_red, TextAlign::CENTER, "%s", cal[i][j]);
              } else {
                it.printf(x_pos, y_pos, id(font_roboto_700_20), color_blk, TextAlign::CENTER, "%s", cal[i][j]);
              }
              
            }
          }
        }
        if (i == 1) {
          it.line(days_line_left_position, calendar_y_pos + (cell_size_height / 2), days_line_right_position, calendar_y_pos + (cell_size_height / 2), color_blk);
        }
      }
  
      // End Draw Calendar

      //Start draw weather:
      // Map weather states to MDI characters.
      std::map<std::string, std::string> weather_icon_map
        {
          {"cloudy", "\U000F0590"},
          {"cloudy-alert", "\U000F0F2F"},
          {"cloudy-arrow-right", "\U000F0E6E"},
          {"clear-night", "\U000F0594"},
          {"fog", "\U000F0591"},
          {"hail", "\U000F0592"},
          {"hazy", "\U000F0F30"},
          {"hurricane", "\U000F0898"},
          {"lightning", "\U000F0593"},
          {"lightning-rainy", "\U000F067E"},
          {"night", "\U000F0594"},
          {"night-partly-cloudy", "\U000F0F31"},
          {"partlycloudy", "\U000F0595"},
          {"partly-lightning", "\U000F0F32"},
          {"partly-rainy", "\U000F0F33"},
          {"partly-snowy", "\U000F0F34"},
          {"partly-snowy-rainy", "\U000F0F35"},
          {"pouring", "\U000F0596"},
          {"rainy", "\U000F0597"},
          {"snowy", "\U000F0598"},
          {"snowy-heavy", "\U000F0F36"},
          {"snowy-rainy", "\U000F067F"},
          {"sunny", "\U000F0599"},
          {"sunny-alert", "\U000F0F37"},
          {"sunny-off", "\U000F14E4"},
          {"sunset", "\U000F059A"},
          {"sunset-down", "\U000F059B"},
          {"sunset-up", "\U000F059C"},
          {"tornado", "\U000F0F38"},
          {"windy", "\U000F059D"},
          {"windy-variant", "\U000F059E"},
        };

      int weather_x_pos = calendar_width;
      int weather_y_pos = calendar_y_pos;

      it.vertical_line(weather_x_pos, weather_y_pos - 10, calendar_height+20, color_red);
      //If i wanna be awesome, i could center it in the box i have.
      int middle_of_box_x = weather_x_pos + ((center - weather_x_pos) / 2);

      int weather_icon_width = 130;
      int weather_icon_height = 130;

      // CURRENT WEATHER
      it.printf(middle_of_box_x, weather_y_pos+20, id(font_mdi_large), color_blk, TextAlign::TOP_CENTER, "%s", weather_icon_map[id(weather_now_condition).state.c_str()].c_str());
      
      // TEMPERATURE
      auto color_temp = (id(weather_now_min_temperature).state >= 25) ? color_red : color_blk;
      it.printf(weather_x_pos + 10, weather_y_pos+20 + weather_icon_height, id(font_mdi_22), color_temp, TextAlign::TOP_LEFT, "\U0000f37a");
      it.printf(weather_x_pos + 10 + 22, weather_y_pos+20 + weather_icon_height, id(font_roboto_700_20), color_temp, TextAlign::TOP_LEFT, "%2.0f°", id(weather_now_min_temperature).state);
      
      color_temp = (id(weather_now_temperature).state >= 25) ? color_red : color_blk;
      it.printf(middle_of_box_x, weather_y_pos+20 + weather_icon_height, id(font_roboto_700_20), color_temp, TextAlign::TOP_CENTER, "%2.0f°", id(weather_now_temperature).state);
      
      color_temp = (id(weather_now_max_temperature).state >= 25) ? color_red : color_blk;
      it.printf(center - 10, weather_y_pos+20 + weather_icon_height, id(font_mdi_22), color_temp, TextAlign::TOP_RIGHT, "\U0000f379");
      it.printf(center - 10 - 22, weather_y_pos+20 + weather_icon_height, id(font_roboto_700_20), color_temp, TextAlign::TOP_RIGHT, "%2.0f°", id(weather_now_max_temperature).state);


