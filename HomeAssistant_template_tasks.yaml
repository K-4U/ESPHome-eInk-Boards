- trigger:
    - platform: time_pattern
      minutes: /3
      #variables: []
      # This will be used as a filter in text sensors so that characters not present in the font will not be printed
      # Copy and paste your list from glyphs in the fonts section of your ESPHome YAML and escape certain characters
      # so backslash \ becomes \\ and double-quote " becomes \" but single-quote ' needs to be doubled ''
      # Make sure your list has "[^ at the front and ]" at the end (this is a regular expression, with quotes around it)
      # allowed_characters: "[^! \"#$%&''()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz°]"
  action:
    - service: todo.get_items
      data:
        status: needs_action
      target:
        entity_id:
          - todo.prive
          - todo.work
          - todo.client
      response_variable: mylist
    - service: calendar.get_events
      data:
        start_date_time: "{{today_at().strftime('%Y-%m-%d %H:%M')}}"
        end_date_time: "{{now().date() + timedelta(days=29)}}"
      target:
        entity_id:
          - calendar.agenda
          - calendar.private
          - calendar.christian_holidays
          - calendar.partner
          - calendar.fasen_van_de_maan
          - calendar.birthdays
      response_variable: mycalendar
  sensor:
    - name: eInk TasksBoard Data
      unique_id: eink_tasksboard_data
      state: "OK"
      attributes:
        today: >
          {%- set counter = namespace(total = 0) -%}
          {%- set list = namespace(todo = []) -%}
          {# -- search todo lists and calendars below this point -- #}
          {# search calendar #}
          {%- for events in mycalendar["calendar.private"]["events"] -%}
            {%- if ("start" in events and (now().date()|string) in events.start) and ("end" in events and (now().timestamp() < as_datetime(events.end).timestamp())) -%}
              {%- set list.todo = list.todo + [{'event': "P: " + (events.summary), 'start_time': (as_datetime(events.start).strftime('%H:%M'))}] -%}
              {%- set counter.total = counter.total + 1 -%}
            {%- endif -%}
          {%- endfor -%}
          {# search calendar and add a note#}
          {%- for events in mycalendar["calendar.partner"]["events"] -%}
            {%- if ("start" in events and (now().date()|string) in events.start) and ("end" in events and (now().timestamp() < as_datetime(events.end).timestamp())) -%}
              {%- set list.todo = list.todo + [{'event': "F: " + (events.summary), 'start_time': (as_datetime(events.start).strftime('%H:%M'))}] -%}
              {%- set counter.total = counter.total + 1 -%}
            {%- endif -%}
          {%- endfor -%}
          {# search calendar and add a note#}
          {%- for events in mycalendar["calendar.fasen_van_de_maan"]["events"] -%}
            {%- if "start" in events and (now().date()|string) in events.start -%}
              {%- set list.todo = list.todo + [{'event': "M: " + (events.summary), 'start_time': ''}] -%}
              {%- set counter.total = counter.total + 1 -%}
            {%- endif -%}
          {%- endfor -%}
          {# search calendar and add a note#}
          {%- for events in mycalendar["calendar.agenda"]["events"] -%}
            {%- if ("start" in events and (now().date()|string) in events.start) and ("end" in events and (now().timestamp() < as_datetime(events.end).timestamp())) -%}
              {%- set list.todo = list.todo + [{'event': "W: " + (events.summary), 'start_time': (as_datetime(events.start).strftime('%H:%M'))}] -%}
              {%- set counter.total = counter.total + 1 -%}
            {%- endif -%}
          {%- endfor -%}
          {# search calendar and add a note#}
          {%- for events in mycalendar["calendar.birthdays"]["events"] -%}
            {%- if ("start" in events and (now().date()|string) in events.start) and ("end" in events and (now().timestamp() < as_datetime(events.end).timestamp())) -%}
              {%- set list.todo = list.todo + [{'event':"B: " + (events.summary), 'start_time': ''}] -%}
              {%- set counter.total = counter.total + 1 -%}
            {%- endif -%}
          {%- endfor -%}

          {# search todo list #}
          {%- for items in mylist["todo.prive"]["items"] -%}
            {%- if "due" in items and items.due <= states('sensor.date') -%}
              {%- set list.todo = list.todo + [{'event': "P: " + (items.summary), 'start_time': ''}] -%}
              {%- set counter.total = counter.total + 1 -%}
            {%- endif -%}
          {%- endfor -%}
          {# Work related. Let's not do those in the weekend #}
          {%- if now().weekday() < 5 -%}
            {# search todo list and add a note #}
            {%- for items in mylist["todo.work"]["items"] -%}
              {%- if "due" in items and items.due <= states('sensor.date') -%}
                {%- set list.todo = list.todo + [{'event': "W: " + (items.summary), 'start_time': ''}] -%}
                {%- set counter.total = counter.total + 1 -%}
              {%- endif -%}
            {%- endfor -%}
            {# search todo list and add a note #}
            {%- for items in mylist["todo.client"]["items"] -%}
              {%- if "due" in items and items.due <= states('sensor.date') -%}
                {%- set list.todo = list.todo + [{'event': "J: " + (items.summary), 'start_time': ''}] -%}
                {%- set counter.total = counter.total + 1 -%}
              {%- endif -%}
            {%- endfor -%}
          {%- endif -%} {# week filter #}
          {# -- end searching -- #}
          {{list.todo | default('') }}
        upcoming: >
          {%- set latest_date = 64 -%}
          {%- set counter = namespace(total = 0) -%}
          {%- set list = namespace(todo = []) -%}
          {%- for v in range(latest_date) -%}
            {# -- search todo lists and calendars below this point -- #}
            {# search calendar #}
            {%- for events in mycalendar["calendar.private"]["events"] -%}
              {%- if "start" in events and ((now().date() + timedelta(days=v+1))|string) in events.start -%}
                {%- set list.todo = list.todo + [{'date': (as_datetime(events.start).strftime('%A %B %-d')), 'event': "P: " + (events.summary), 'start_time': (as_datetime(events.start).strftime('%H:%M'))}] -%}
                {%- set counter.total = counter.total + 1 -%}
              {%- endif -%}
            {%- endfor -%}
            {%- for events in mycalendar["calendar.partner"]["events"] -%}
              {%- if "start" in events and ((now().date() + timedelta(days=v+1))|string) in events.start -%}
                {%- set list.todo = list.todo + [{'date': (as_datetime(events.start).strftime('%A %B %-d')), 'event': "F: " + (events.summary), 'start_time': (as_datetime(events.start).strftime('%H:%M'))}] -%}
                {%- set counter.total = counter.total + 1 -%}
              {%- endif -%}
            {%- endfor -%}
            {%- for events in mycalendar["calendar.birthdays"]["events"] -%}
              {%- if "start" in events and ((now().date() + timedelta(days=v+1))|string) in events.start -%}
                {%- set list.todo = list.todo + [{'date': (as_datetime(events.start).strftime('%A %B %-d')), 'event': "B: " + (events.summary), 'start_time': (as_datetime(events.start).strftime('%H:%M'))}] -%}
                {%- set counter.total = counter.total + 1 -%}
              {%- endif -%}
            {%- endfor -%}
            {# search todo list #}
            {%- for items in mylist["todo.prive"]["items"] -%}
              {%- if "due" in items and ((now().date() + timedelta(days=v+1))|string) in items.due -%}
                {%- set item_date = as_datetime(items.due).strftime('%A %B %-d') -%}
                {%- set list.todo = list.todo + [{'date': item_date, 'event': "P: " + items.summary, 'start_time': ''}] -%}
                {%- set counter.total = counter.total + 1 -%}
              {%- endif -%}
            {%- endfor -%}
            {%- for items in mylist["todo.work"]["items"] -%}
              {%- if "due" in items and ((now().date() + timedelta(days=v+1))|string) in items.due -%}
                {%- set item_date = as_datetime(items.due).strftime('%A %B %-d') -%}
                {%- set list.todo = list.todo + [{'date': item_date, 'event': "W: " + items.summary, 'start_time': ''}] -%}
                {%- set counter.total = counter.total + 1 -%}
              {%- endif -%}
            {%- endfor -%}
            {%- for items in mylist["todo.client"]["items"] -%}
              {%- if "due" in items and ((now().date() + timedelta(days=v+1))|string) in items.due -%}
                {%- set item_date = as_datetime(items.due).strftime('%A %B %-d') -%}
                {%- set list.todo = list.todo + [{'date': item_date, 'event': "J: " + items.summary, 'start_time': ''}] -%}
                {%- set counter.total = counter.total + 1 -%}
              {%- endif -%}
            {%- endfor -%}
            {# -- end searching -- #}
            {%- if counter.total >= 25 -%}
              {%- break -%}
            {%- endif -%}
          {%- endfor -%}
          {{list.todo | default('') }}

- trigger:
    - platform: time_pattern
      minutes: /1
      variables:
        waketime: >
          {# Edit and order the schedule from midnight 00:00 to 23:59 as needed #}
          {%- set tmp = namespace(list = []) %}
          {%- set tmp.list = ["00:01"] %}
          {%- set tmp.list = tmp.list + ["01:01"] %}
          {%- for hour in range(6,23)  -%}
          {% set tmp.list = tmp.list + ["%d:01"%(hour)] %}
          {% endfor %}
          {%- set tmp.list = tmp.list + ["22:27"] %}
          {% set waketimes = tmp.list %}


          {%- set waketime = namespace(next = "") %}
          {%- set waketime_all = [] %}
          {%- for test in waketimes %}
            {%- set waketime.next = (now().strftime('%Y-%m-%d')|string) + " " + (test|string) %}
            {%- if (now().strftime('%Y-%m-%d %H:%M:%S')|string|as_datetime) < (waketime.next|as_datetime) %}
              {%- break %}
            {%- endif %}
          {%- endfor %}
          {%- if (now().strftime('%Y-%m-%d %H:%M:%S')|string|as_datetime) > (waketime.next|as_datetime) %}
            {%- set waketime.next = (now().strftime('%Y-%m-%d')|string) + " " + (waketimes[0]|string) %}
            {%- set waketime_helper = ((as_timestamp(waketime.next|as_datetime + timedelta(days=1)) - as_timestamp(now()|as_datetime))|int(0)) %}
          {%- else %}
            {%- set waketime_helper = ((as_timestamp(waketime.next|as_datetime) - as_timestamp(now()|as_datetime))|int(0)) %}
          {%- endif %}
          {%- set waketime_all = [waketime.next] + [waketime_helper] + [waketimes] %}
          {{waketime_all}}
  sensor:
    - name: eInk TasksBoard Wake Times
      unique_id: eink_tasksboard_wake_times
      state: "{{ this.attributes.next_wake_time | default('Not Available') }}"
      attributes:
        wake_times: "{{ waketime[2] | default('Not Available') }}"
        next_wake_time: "{{ waketime[0] | default(999999) }}"
        wake_time_helper: "{{ waketime[1] | default('Not Available') }}"
